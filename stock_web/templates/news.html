{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>{{ news_page_title or "资讯舆情" }}</h1>
    <p>{{ news_page_hint or "聚合市场热点，辅助你更快判断板块轮动。" }}</p>
</div>
<div class="card-panel news-toolbar {% if (news_mode or 'all') == 'all' %}news-toolbar-simple{% endif %}">
    <div class="form-group">
        <label for="news-source">数据来源</label>
        <select id="news-source">
            <option value="ALL">全部</option>
        </select>
    </div>
    {% if (news_mode or 'all') != 'all' %}
    <div class="form-group">
        <label for="news-search-type">搜索方式</label>
        <select id="news-search-type">
            <option value="keyword">关键词</option>
            <option value="title">新闻标题</option>
            <option value="code">股票代码</option>
            <option value="stock">股票信息</option>
            <option value="source">来源名称</option>
        </select>
    </div>
    <div class="form-group news-query-group">
        <label for="news-query">搜索内容</label>
        <input type="text" id="news-query" placeholder="如：美联储 / AAPL / 腾讯控股">
    </div>
    <div class="news-toolbar-actions">
        <button id="news-search-btn" class="btn-primary">搜索</button>
        <button id="news-reset-btn" class="btn-secondary">重置</button>
    </div>
    {% endif %}
</div>
<div class="card-panel">
    <div id="news-list" class="news-list" data-mode="{{ news_mode or 'all' }}"></div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pages/news.js') }}"></script>
{% endblock %}
