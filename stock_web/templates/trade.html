{% extends "base.html" %}

{% block content %}
<div class="page-header">
    <h1>交易中心</h1>
    <p>支持模拟买卖、持仓盈亏统计与资金变动追踪。</p>
</div>
<div class="trade-page">
    <div class="account-summary card-panel">
        <h2>账户概览</h2>
        <div id="account-info">
            Loading account info...
        </div>
    </div>
    
    <div class="trade-form card-panel">
        <h2>下单区</h2>
        <form id="trade-form">
            <div class="form-group">
                <label for="stock-code">股票代码</label>
                <input type="text" id="stock-code" name="code" required>
            </div>
            <div class="form-group">
                <label for="quantity">数量（手）</label>
                <input type="number" id="quantity" name="quantity" min="1" value="1" required>
            </div>
            <div class="form-group">
                <button type="button" id="btn-buy" class="btn-primary">买入</button>
                <button type="button" id="btn-sell" class="btn-danger">卖出</button>
            </div>
            <div id="trade-message" class="alert" style="display:none;"></div>
        </form>
    </div>
    
    <div class="positions card-panel">
        <h2>当前持仓</h2>
        <table id="positions-table">
            <thead>
                <tr>
                    <th>代码</th>
                    <th>名称</th>
                    <th>股数</th>
                    <th>成本</th>
                    <th>市值</th>
                    <th>盈亏</th>
                    <th>盈亏比</th>
                </tr>
            </thead>
            <tbody>
            </tbody>
        </table>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script src="{{ url_for('static', filename='js/pages/trade.js') }}"></script>
{% endblock %}
